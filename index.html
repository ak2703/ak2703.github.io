<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>akshay.os — Akshay Vilekar</title>
<meta name="description" content="Backend engineer's portfolio rendered as a retro desktop." />

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Caveat:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=VT323&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
/* ============================================================
   akshay.os — Retro desktop portfolio
   Cream paper, chunky borders, hard offset shadows.
   ============================================================ */

:root {
  --paper:    #f3ecd6;
  --paper-2:  #e9e0c4;
  --paper-3:  #ddd2b0;
  --ink:      #1a1814;
  --ink-2:    #3a342a;
  --mute:     #6f6a5e;
  --dim:      #a8a292;

  --red:      #ee4d3a;
  --blue:     #2a6df2;
  --yellow:   #ffd34d;
  --mint:     #69d29e;
  --pink:     #ff8fb8;
  --purple:   #9a6bff;
  --orange:   #ff9333;
  --teal:     #46c2c2;

  --shadow:    4px 4px 0 var(--ink);
  --shadow-lg: 6px 6px 0 var(--ink);
  --shadow-sm: 2px 2px 0 var(--ink);

  --border:      2.5px solid var(--ink);
  --border-thin: 1.5px solid var(--ink);

  --f-display: "Space Grotesk", ui-sans-serif, system-ui, sans-serif;
  --f-sans:    "Plus Jakarta Sans", "Inter", ui-sans-serif, sans-serif;
  --f-mono:    "JetBrains Mono", ui-monospace, "SF Mono", Menlo, monospace;
  --f-hand:    "Caveat", "Comic Sans MS", cursive;
  --f-pixel:   "VT323", "JetBrains Mono", ui-monospace, monospace;

  --menu-h:  34px;
  --dock-h:  56px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; height: 100%; overflow: hidden; }

body {
  background: var(--paper);
  color: var(--ink);
  font-family: var(--f-sans);
  font-size: 15px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;

  /* Halftone-ish dot wallpaper */
  background-image:
    radial-gradient(circle at 1.5px 1.5px, color-mix(in oklab, var(--ink) 18%, transparent) 1.5px, transparent 0),
    radial-gradient(circle at 12px 12px, color-mix(in oklab, var(--red) 22%, transparent) 1px, transparent 0);
  background-size: 24px 24px, 48px 48px;
}

::selection { background: var(--yellow); color: var(--ink); }
a { color: inherit; text-decoration: none; }
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }

/* ---------- Menu bar ---------- */
.menubar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--menu-h);
  z-index: 1000;
  background: var(--paper-2);
  border-bottom: var(--border);
  display: flex; align-items: center;
  padding: 0 16px;
  font-family: var(--f-display);
  font-weight: 500;
  font-size: 14px;
  letter-spacing: -0.005em;
  user-select: none;
}
.menubar .apple {
  width: 22px; height: 22px;
  background: var(--ink); color: var(--paper);
  display: grid; place-items: center;
  border-radius: 4px; margin-right: 14px;
  font-family: var(--f-display); font-weight: 700;
  font-size: 12px;
}
.menubar .m-item {
  padding: 4px 12px; border-radius: 4px;
  cursor: pointer;
  transition: background 100ms;
}
.menubar .m-item:hover { background: var(--ink); color: var(--paper); }
.menubar .m-item.bold { font-weight: 700; }
.menubar .m-item.open { background: var(--ink); color: var(--paper); }
.menubar .spacer { flex: 1; }

/* ---------- Menu dropdowns ---------- */
.menu { position: relative; display: inline-block; }
.menu-dropdown {
  position: absolute;
  top: calc(100% + 4px);
  background: var(--paper);
  border: var(--border);
  border-radius: 8px;
  box-shadow: var(--shadow-lg);
  min-width: 220px;
  padding: 6px;
  font-family: var(--f-sans);
  font-size: 13px;
  font-weight: 500;
  z-index: 1500;
  animation: dropOpen 140ms cubic-bezier(.2,.6,.2,1);
  color: var(--ink);
}
@keyframes dropOpen { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.menu-dropdown.right { right: 0; left: auto; }
.menu-row {
  padding: 7px 12px;
  border-radius: 5px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
}
.menu-row:hover { background: var(--ink); color: var(--paper); }
.menu-row.disabled { opacity: 0.4; cursor: default; }
.menu-row.disabled:hover { background: transparent; color: inherit; }
.menu-row .ic { width: 18px; font-family: var(--f-mono); font-size: 13px; color: var(--mute); flex-shrink: 0; }
.menu-row:hover .ic { color: var(--yellow); }
.menu-row .lab { flex: 1; }
.menu-row .hint { font-family: var(--f-mono); font-size: 10px; color: var(--mute); }
.menu-row:hover .hint { color: var(--yellow); }
.menu-divider { border-top: 1.5px dashed var(--paper-3); margin: 4px -6px; }

/* Contact card head inside dropdown */
.menu-contact-head {
  display: flex; gap: 12px; align-items: center;
  padding: 6px 8px 12px;
  margin-bottom: 4px;
  border-bottom: 1.5px dashed var(--paper-3);
}
.menu-contact-head .avatar {
  width: 40px; height: 40px;
  background: var(--blue);
  color: #fff;
  border: 1.5px solid var(--ink);
  border-radius: 8px;
  display: grid; place-items: center;
  font-family: var(--f-display); font-weight: 700; font-size: 14px;
  box-shadow: var(--shadow-sm);
}
.menu-contact-head .info .nm { font-family: var(--f-display); font-weight: 700; font-size: 14px; letter-spacing: -0.01em; }
.menu-contact-head .info .sub { font-family: var(--f-mono); font-size: 11px; color: var(--mute); margin-top: 1px; }

/* Contact button (right side) */
.contact-button {
  display: inline-flex; align-items: center; gap: 6px;
  height: 24px; padding: 0 10px;
  background: var(--red); color: #fff;
  border: 1.5px solid var(--ink);
  border-radius: 6px;
  font-family: var(--f-display);
  font-weight: 600;
  font-size: 12px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 100ms, box-shadow 100ms;
  margin-right: 4px;
}
.contact-button:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); }
.contact-button.open { background: var(--ink); color: var(--yellow); }

/* Empty / new note window content */
.note-empty {
  font-family: var(--f-mono);
  font-size: 13px;
  line-height: 1.65;
  color: var(--ink-2);
  white-space: pre-wrap;
  outline: none;
  min-height: 100%;
}
.note-empty[contenteditable="true"]:empty::before {
  content: attr(data-placeholder);
  color: var(--dim);
  font-style: italic;
}
.menubar .meta {
  display: flex; align-items: center; gap: 14px;
  font-family: var(--f-mono); font-size: 12px;
  color: var(--ink-2);
}
.menubar .meta .live::before {
  content: ""; display: inline-block;
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--mint); margin-right: 6px;
  border: 1.5px solid var(--ink); vertical-align: 0;
}
@media (max-width: 720px) {
  .menubar .m-item:not(.bold):not(.help) { display: none; }
  .menubar .meta .hide-sm { display: none; }
}

/* ---------- Desktop ---------- */
.desktop {
  position: fixed;
  top: var(--menu-h);
  left: 0;
  right: 0;
  bottom: var(--dock-h);
  overflow: hidden;
}

/* Icon grid on the desktop */
.desktop-icons {
  position: absolute;
  top: 24px; left: 24px;
  display: grid;
  grid-template-columns: repeat(auto-fill, 96px);
  grid-auto-rows: 110px;
  gap: 8px 12px;
  max-height: calc(100% - 48px);
  align-content: start;
}
@media (max-width: 760px) {
  .desktop-icons {
    grid-template-columns: repeat(auto-fill, 76px);
    grid-auto-rows: 92px;
    top: 12px; left: 12px;
  }
}

.icon {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
  padding: 8px 4px;
  border-radius: 8px;
  cursor: pointer;
  user-select: none;
  text-align: center;
  transition: background 80ms;
}
.icon:hover { background: color-mix(in oklab, var(--ink) 6%, transparent); }
.icon.selected { background: color-mix(in oklab, var(--ink) 16%, transparent); }
.icon svg { width: 56px; height: 56px; display: block; }
.icon .name {
  font-family: var(--f-display);
  font-weight: 600;
  font-size: 12px;
  letter-spacing: -0.005em;
  line-height: 1.15;
  background: color-mix(in oklab, var(--paper) 90%, transparent);
  padding: 1px 6px;
  border-radius: 3px;
  max-width: 100%;
  text-wrap: balance;
}
.icon.selected .name { background: var(--blue); color: #fff; border: 1.5px solid var(--ink); }
@media (max-width: 760px) {
  .icon svg { width: 44px; height: 44px; }
  .icon .name { font-size: 11px; }
}

/* ---------- Window ---------- */
.window {
  position: absolute;
  background: var(--paper);
  border: var(--border);
  border-radius: 10px;
  box-shadow: var(--shadow-lg);
  display: flex; flex-direction: column;
  min-width: 280px;
  overflow: hidden;
  animation: winOpen 220ms cubic-bezier(.2,.6,.2,1);
}
@keyframes winOpen { from { opacity: 0; transform: scale(.96) translateY(8px); } to { opacity: 1; transform: none; } }

.window.minimized { display: none; }

.window-title {
  display: flex; align-items: center; gap: 12px;
  padding: 8px 12px;
  background: var(--paper-2);
  border-bottom: var(--border);
  cursor: grab;
  user-select: none;
  position: relative;
}
.window-title:active { cursor: grabbing; }
.window-title.striped {
  background-image:
    repeating-linear-gradient(0deg,
      var(--paper-2) 0 3px,
      var(--paper-3) 3px 6px);
}
.window.focused .window-title { background: var(--yellow); background-image: repeating-linear-gradient(0deg, var(--yellow) 0 3px, color-mix(in oklab, var(--yellow) 70%, var(--ink) 12%) 3px 6px); }
.window-buttons { display: flex; gap: 6px; }
.win-btn {
  width: 16px; height: 16px; border-radius: 50%;
  border: 1.5px solid var(--ink);
  background: var(--paper);
  display: grid; place-items: center;
  font-family: var(--f-mono); font-size: 9px;
  color: transparent;
  transition: color 100ms;
}
.win-btn:hover { color: var(--ink); }
.win-btn.close { background: var(--red); }
.win-btn.min { background: var(--yellow); }
.win-btn.max { background: var(--mint); }
.window-name {
  flex: 1; text-align: center;
  font-family: var(--f-mono);
  font-size: 13px;
  font-weight: 600;
  color: var(--ink);
  letter-spacing: -0.005em;
}
.window-name .ico { margin-right: 6px; opacity: 0.7; }

.window-body {
  flex: 1;
  overflow-y: auto;
  background: var(--paper);
  position: relative;
}
.window-body.padded { padding: 22px 24px; }
.window-statusbar {
  border-top: var(--border-thin);
  padding: 4px 12px;
  font-family: var(--f-mono);
  font-size: 11px;
  color: var(--mute);
  background: var(--paper-2);
  display: flex; justify-content: space-between; gap: 12px;
}

/* ---------- Dock ---------- */
.dock {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--dock-h);
  background: var(--paper-2);
  border-top: var(--border);
  z-index: 1000;
  display: flex; align-items: center;
  padding: 0 16px;
  gap: 10px;
  font-family: var(--f-mono);
  font-size: 12px;
  user-select: none;
}
.dock .start-btn {
  height: 38px;
  padding: 0 14px;
  background: var(--ink);
  color: var(--paper);
  border-radius: 8px;
  border: var(--border-thin);
  display: inline-flex; gap: 8px; align-items: center;
  font-family: var(--f-display);
  font-weight: 600; font-size: 14px;
  box-shadow: var(--shadow-sm);
  transition: transform 120ms, box-shadow 120ms;
}
.dock .start-btn:hover { transform: translate(-1px,-1px); box-shadow: 3px 3px 0 var(--ink); background: var(--red); }
.dock .start-btn .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--mint);
  border: 1.5px solid var(--paper);
}
.dock .open-list {
  display: flex; gap: 6px; align-items: center;
  flex: 1;
  overflow-x: auto;
  scrollbar-width: none;
}
.dock .open-list::-webkit-scrollbar { display: none; }
.dock-tab {
  height: 34px;
  padding: 0 12px;
  background: var(--paper);
  border: var(--border-thin);
  border-radius: 6px;
  display: inline-flex; gap: 8px; align-items: center;
  font-family: var(--f-mono); font-size: 12px;
  color: var(--ink);
  cursor: pointer;
  white-space: nowrap;
  box-shadow: var(--shadow-sm);
  transition: transform 100ms, background 120ms;
}
.dock-tab:hover { transform: translate(-1px,-1px); }
.dock-tab.active { background: var(--yellow); }
.dock .meta-right { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.dock .clock { font-family: var(--f-mono); font-size: 12px; color: var(--ink); padding: 0 8px; }
.dock .iconbtn {
  width: 34px; height: 34px;
  border: var(--border-thin); border-radius: 6px;
  background: var(--paper);
  display: grid; place-items: center;
  box-shadow: var(--shadow-sm);
  transition: transform 100ms, background 120ms;
}
.dock .iconbtn:hover { transform: translate(-1px,-1px); background: var(--yellow); }

@media (max-width: 720px) {
  .dock .meta-right .hide-sm { display: none; }
}

/* ---------- Welcome content ---------- */
.welcome {
  font-family: var(--f-sans);
  padding: 6px 0 0;
}
.welcome .hi {
  font-family: var(--f-hand);
  font-size: 28px;
  color: var(--red);
  margin-bottom: 0;
  line-height: 1;
}
.welcome h1 {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 44px;
  letter-spacing: -0.03em;
  line-height: 1.0;
  margin: 6px 0 16px;
}
.welcome h1 .hl { background: var(--yellow); padding: 0 6px; border: 1.5px solid var(--ink); display: inline-block; transform: rotate(-1deg); }
.welcome h1 .scribble { color: var(--red); position: relative; font-style: italic; white-space: nowrap; }
.welcome h1 .scribble::after {
  content: ""; position: absolute; left: 0; right: 0; bottom: -3px; height: 12px;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 14'><path d='M2 8 Q 25 2 50 8 T 100 8 T 150 8 T 198 8' stroke='%23ee4d3a' stroke-width='3.5' fill='none' stroke-linecap='round'/></svg>");
  background-repeat: no-repeat; background-size: 100% 100%;
}
.welcome p { font-size: 16px; line-height: 1.6; color: var(--ink-2); margin: 0 0 14px; }
.welcome p strong { background: color-mix(in oklab, var(--yellow) 55%, transparent); padding: 0 3px; font-weight: 600; }
.welcome .arrows {
  font-family: var(--f-mono); font-size: 12px;
  color: var(--mute); margin-top: 18px;
  display: flex; flex-direction: column; gap: 4px;
  border-top: 1px dashed var(--mute);
  padding-top: 14px;
}
.welcome .arrows .row { display: flex; gap: 10px; }
.welcome .arrows .row .k { color: var(--red); font-weight: 600; min-width: 90px; }
.welcome .arrows .row .v strong { font-weight: 600; color: var(--ink); }

/* ---------- Common content patterns ---------- */
h2.win-h {
  font-family: var(--f-display);
  font-weight: 700;
  font-size: 28px;
  letter-spacing: -0.025em;
  margin: 0 0 6px;
  line-height: 1.05;
}
h2.win-h em {
  font-family: var(--f-hand);
  font-style: normal;
  font-weight: 500;
  color: var(--red);
  font-size: 1.05em;
}
.win-sub {
  font-family: var(--f-mono); font-size: 11px;
  color: var(--mute); letter-spacing: 0.12em;
  text-transform: uppercase;
  margin-bottom: 20px;
}

.win-body p { color: var(--ink-2); line-height: 1.65; margin: 0 0 14px; }
.win-body p strong { font-weight: 600; color: var(--ink); }

/* Stickers (used in about) */
.stickers { display: flex; flex-wrap: wrap; gap: 8px; }
.sticker {
  font-family: var(--f-display); font-weight: 600; font-size: 13px;
  padding: 5px 12px; border: var(--border-thin); border-radius: 100px;
  box-shadow: var(--shadow-sm); background: var(--paper);
  cursor: default;
  transition: transform 140ms;
}
.sticker:hover { transform: translate(-1px,-1px) rotate(-2deg); }
.sticker.c-yellow { background: var(--yellow); }
.sticker.c-blue   { background: var(--blue); color: #fff; }
.sticker.c-mint   { background: var(--mint); }
.sticker.c-pink   { background: var(--pink); }
.sticker.c-red    { background: var(--red); color: #fff; }
.sticker.c-purple { background: var(--purple); color: #fff; }
.sticker.c-orange { background: var(--orange); color: #fff; }

.kv-list { display: flex; flex-direction: column; gap: 8px; margin: 14px 0; }
.kv-list .row { display: grid; grid-template-columns: 110px 1fr; gap: 12px; font-size: 14px; }
.kv-list .row .k { font-family: var(--f-mono); font-size: 11px; color: var(--mute); letter-spacing: 0.08em; text-transform: uppercase; padding-top: 2px; }
.kv-list .row .v { color: var(--ink); font-weight: 500; }
.kv-list .row .v .em { color: var(--red); font-family: var(--f-hand); font-size: 17px; margin-left: 4px; }

/* Experience list */
.exp-list { display: flex; flex-direction: column; }
.exp-entry {
  padding: 16px 0;
  border-top: 1.5px dashed var(--paper-3);
  cursor: pointer;
}
.exp-entry:first-child { border-top: 0; padding-top: 4px; }
.exp-entry-head { display: flex; justify-content: space-between; gap: 16px; align-items: baseline; }
.exp-entry .role { font-family: var(--f-display); font-weight: 700; font-size: 18px; letter-spacing: -0.015em; }
.exp-entry .role .at { color: var(--mute); font-weight: 500; }
.exp-entry .when { font-family: var(--f-mono); font-size: 11px; color: var(--mute); white-space: nowrap; }
.exp-entry .place { font-family: var(--f-mono); font-size: 11px; color: var(--mute); margin-top: 4px; }
.exp-entry .badge { font-family: var(--f-mono); font-size: 10px; padding: 2px 8px; border: 1.5px solid var(--red); border-radius: 100px; background: var(--red); color: #fff; margin-left: 8px; }
.exp-entry .tags { display: flex; gap: 6px; margin-top: 6px; flex-wrap: wrap; }
.exp-entry .chip { font-family: var(--f-mono); font-size: 10px; padding: 2px 7px; border: 1.5px solid var(--ink); border-radius: 100px; background: var(--paper-2); }
.exp-entry .chip.c1 { background: var(--yellow); }
.exp-entry .chip.c2 { background: var(--mint); }
.exp-entry .chip.c3 { background: var(--pink); }
.exp-entry .chip.c4 { background: var(--blue); color: #fff; }
.exp-entry .detail {
  display: grid; grid-template-rows: 0fr;
  transition: grid-template-rows 280ms, margin 280ms;
  font-size: 14px; line-height: 1.6; color: var(--ink-2);
  margin-top: 0;
}
.exp-entry .detail > div { overflow: hidden; }
.exp-entry[data-open="true"] .detail { grid-template-rows: 1fr; margin-top: 12px; }

/* Stack list (inside skills window) */
.stack-list { display: grid; grid-template-columns: 1fr; gap: 18px; }
.stack-group h4 {
  font-family: var(--f-display); font-weight: 700; font-size: 14px;
  margin: 0 0 8px; padding: 2px 10px; border: 1.5px solid var(--ink); border-radius: 6px;
  display: inline-block;
}
.stack-group:nth-child(1) h4 { background: var(--yellow); }
.stack-group:nth-child(2) h4 { background: var(--mint); }
.stack-group:nth-child(3) h4 { background: var(--pink); }
.stack-group:nth-child(4) h4 { background: var(--blue); color: #fff; }
.stack-group ul { list-style: none; padding: 0; margin: 0; }
.stack-group li {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 4px 0;
  border-bottom: 1.5px dashed var(--paper-3);
  font-size: 14px;
  font-weight: 500;
}
.stack-group li .lvl { font-family: var(--f-mono); font-size: 10px; color: var(--mute); }

/* Projects (file list inside projects window) */
.proj-list { display: flex; flex-direction: column; }
.proj-item {
  display: grid;
  grid-template-columns: 56px 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 12px;

<script type="text/babel">
/* Command palette */
function CommandPalette({ open, onClose, openWin, extraItems = [] }) {
  const [q, setQ] = React.useState("");
  const [active, setActive] = React.useState(0);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (open) { setQ(""); setActive(0); setTimeout(() => inputRef.current?.focus(), 30); }
  }, [open]);

  const items = React.useMemo(() => ([
    { sec: "Open", icon: "📄", label: "welcome.rtf",   id: "welcome",    hint: "↵" },
    { sec: "Open", icon: "👤", label: "about-me.txt",  id: "about",      hint: "↵" },
    { sec: "Open", icon: "📁", label: "experience/",   id: "experience", hint: "↵" },
    { sec: "Open", icon: "📁", label: "projects/",     id: "projects",   hint: "↵" },
    { sec: "Open", icon: "⚙",  label: "skills.app",    id: "skills",     hint: "↵" },
    { sec: "Open", icon: "📁", label: "writing/",      id: "writing",    hint: "↵" },
    { sec: "Open", icon: "♪",  label: "now.app",       id: "now",        hint: "↵" },
    { sec: "Open", icon: "💌", label: "contact.app",   id: "contact",    hint: "↵" },
    { sec: "Open", icon: "🎓", label: "education.txt", id: "education",  hint: "↵" },
    { sec: "Open", icon: "📌", label: "notes.sticky",  id: "sticky",     hint: "↵" },
    { sec: "Open", icon: "📄", label: "README.md",     id: "readme",     hint: "↵" },
    { sec: "Open", icon: "💾", label: "akshay.os",     id: "hdd",        hint: "↵" },
    ...extraItems,
    { sec: "Quick links", icon: "✉", label: "Email Akshay",   action: () => window.location.href = "mailto:contact@akshayvilekar.me" },
    { sec: "Quick links", icon: "in", label: "Open LinkedIn",  action: () => window.open("https://www.linkedin.com/in/akshay-vilekar-b25a2584/", "_blank") },
    { sec: "Quick links", icon: "𝕏", label: "Open Twitter",    action: () => window.open("https://twitter.com/ak2703", "_blank") },
    { sec: "Quick links", icon: "gh", label: "Open GitHub",     action: () => window.open("https://github.com/ak2703", "_blank") },
  ]), [extraItems]);

  const filtered = React.useMemo(() => {
    if (!q.trim()) return items;
    const needle = q.toLowerCase();
    return items.filter(i => i.label.toLowerCase().includes(needle) || i.sec.toLowerCase().includes(needle));
  }, [q, items]);

  React.useEffect(() => { setActive(0); }, [q]);

  function pick(it) {
    if (!it) return;
    if (it.action) it.action();
    else if (it.id) openWin(it.id);
    onClose();
  }

  React.useEffect(() => {
    if (!open) return;
    function onKey(e) {
      if (e.key === "Escape") { e.preventDefault(); onClose(); }
      else if (e.key === "ArrowDown") { e.preventDefault(); setActive(a => Math.min(filtered.length - 1, a + 1)); }
      else if (e.key === "ArrowUp")   { e.preventDefault(); setActive(a => Math.max(0, a - 1)); }
      else if (e.key === "Enter")     { e.preventDefault(); pick(filtered[active]); }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, [open, filtered, active, onClose]);

  if (!open) return null;
  const groups = {};
  filtered.forEach((it, i) => { (groups[it.sec] ||= []).push({ ...it, _idx: i }); });

  return (
    <div className="cmdk-overlay" onMouseDown={(e) => { if (e.target === e.currentTarget) onClose(); }}>
      <div className="cmdk" role="dialog">
        <input ref={inputRef} className="cmdk-input" placeholder="search files & apps…" value={q} onChange={(e) => setQ(e.target.value)} />
        <div className="cmdk-list">
          {filtered.length === 0 && <div className="cmdk-empty">no matches.</div>}
          {Object.entries(groups).map(([sec, list]) => (
            <div key={sec}>
              <div className="cmdk-section-label">{sec}</div>
              {list.map(it => (
                <div key={it.label} className="cmdk-item" data-active={it._idx === active}
                     onMouseEnter={() => setActive(it._idx)} onClick={() => pick(it)}>
                  <span className="ico">{it.icon}</span>
                  <span>{it.label}</span>
                  <span className="meta">{it.hint || ""}</span>
                </div>
              ))}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}
</script>

<script type="text/babel">
/* Desktop manager — menu bar, icons, windows, dock */

const { useState, useEffect, useRef, useCallback } = React;

function useDrag(getPos, onChange, dragHandleRef, enabled = true) {
  useEffect(() => {
    const el = dragHandleRef.current;
    if (!el || !enabled) return;
    let startX, startY, origX, origY;
    function onDown(e) {
      if (e.target.closest(".win-btn")) return;
      e.preventDefault();
      const p = "touches" in e ? e.touches[0] : e;
      startX = p.clientX;
      startY = p.clientY;
      const cur = getPos();
      origX = cur.x;
      origY = cur.y;
      window.addEventListener("mousemove", onMove);
      window.addEventListener("mouseup", onUp);
      window.addEventListener("touchmove", onMove, { passive: false });
      window.addEventListener("touchend", onUp);
    }
    function onMove(e) {
      if (e.cancelable) e.preventDefault();
      const p = "touches" in e ? e.touches[0] : e;
      onChange({ x: origX + (p.clientX - startX), y: Math.max(36, origY + (p.clientY - startY)) });
    }
    function onUp() {
      window.removeEventListener("mousemove", onMove);
      window.removeEventListener("mouseup", onUp);
      window.removeEventListener("touchmove", onMove);
      window.removeEventListener("touchend", onUp);
    }
    el.addEventListener("mousedown", onDown);
    el.addEventListener("touchstart", onDown, { passive: false });
    return () => {
      el.removeEventListener("mousedown", onDown);
      el.removeEventListener("touchstart", onDown);
    };
  }, [getPos, onChange, dragHandleRef, enabled]);
}

function Menu({ trigger, items, align = "left", openController }) {
  const [open, setOpen] = useState(false);
  const isOpen = openController ? openController.value === openController.id : open;
  const setIsOpen = openController ? (v) => openController.set(v ? openController.id : null) : setOpen;
  const ref = useRef(null);

  useEffect(() => {
    if (!isOpen) return;
    function onDoc(e) {
      if (!ref.current?.contains(e.target)) setIsOpen(false);
    }
    function onKey(e) { if (e.key === "Escape") setIsOpen(false); }
    document.addEventListener("mousedown", onDoc);
    document.addEventListener("keydown", onKey);
    return () => { document.removeEventListener("mousedown", onDoc); document.removeEventListener("keydown", onKey); };
  }, [isOpen, setIsOpen]);

  return (
    <div className="menu" ref={ref}>
      {trigger({ open: isOpen, toggle: () => setIsOpen(!isOpen) })}
      {isOpen && (
        <div className={`menu-dropdown ${align}`}>
          {items.map((it, i) => {
            if (it.divider) return <div key={i} className="menu-divider" />;
            if (it.custom) return <div key={i}>{it.custom}</div>;
            return (
              <div key={i}
                   className={`menu-row ${it.disabled ? "disabled" : ""}`}
                   onClick={() => { if (it.disabled) return; it.action?.(); setIsOpen(false); }}>
                <span className="ic">{it.icon || ""}</span>
                <span className="lab">{it.label}</span>
                {it.hint && <span className="hint">{it.hint}</span>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function Win({ win, focused, onFocus, onClose, onMin, onMax, onMove, children }) {
  const titleRef = useRef(null);
  const getPos = useCallback(() => ({ x: win.x, y: win.y }), [win.x, win.y]);
  const handleChange = useCallback((p) => onMove(win.uid, p), [win.uid, onMove]);
  useDrag(getPos, handleChange, titleRef, !win.maximized);

  const style = win.maximized
    ? { left: 0, top: 0, width: "100%", height: "100%", zIndex: win.z }
    : { left: win.x, top: win.y, width: win.w, height: win.h, zIndex: win.z };

  return (
    <div
      className={`window ${focused ? "focused" : ""} ${win.theme === "sticky" ? "sticky-note" : ""} ${win.minimized ? "minimized" : ""} ${win.maximized ? "maximized" : ""}`}
      style={style}
      onMouseDown={() => onFocus(win.uid)}>
      <div className="window-title striped" ref={titleRef}>
        <div className="window-buttons">
          <button className="win-btn close" onMouseDown={(e) => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); onClose(win.uid); }} title="Close">×</button>
          <button className="win-btn min"   onMouseDown={(e) => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); onMin(win.uid); }} title="Minimize">−</button>
          <button className="win-btn max"   onMouseDown={(e) => e.stopPropagation()} onClick={(e) => { e.stopPropagation(); onMax(win.uid); }} title={win.maximized ? "Restore" : "Maximize"}>+</button>
        </div>
        <div className="window-name"><span className="ico">{win.icon}</span>{win.title}</div>
        <div style={{ width: 60 }} />
      </div>
      <div className={`window-body ${win.padded !== false ? "padded" : ""}`}>{children}</div>
      {win.statusBar && (
        <div className="window-statusbar">
          <span>{win.statusBar.left}</span><span>{win.statusBar.right}</span>
        </div>
      )}
    </div>
  );
}

function DesktopIcon({ icon, name, onOpen }) {
  const [selected, setSelected] = useState(false);
  const lastClick = useRef(0);
  function handleClick(e) {
    e.stopPropagation();
    const now = Date.now();
    if (now - lastClick.current < 350) { onOpen(); setSelected(false); }
    else { setSelected(true); setTimeout(() => setSelected(false), 2500); }
    lastClick.current = now;
  }
  return (
    <div className={`icon ${selected ? "selected" : ""}`} onClick={handleClick}
         onDoubleClick={(e) => { e.stopPropagation(); onOpen(); }}>
      {icon}
      <div className="name">{name}</div>
    </div>
  );
}

function MenuClock() {
  const [t, setT] = useState(() => fmt());
  useEffect(() => { const id = setInterval(() => setT(fmt()), 1000); return () => clearInterval(id); }, []);
  function fmt() {
    const d = new Date();
    const day = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][d.getDay()];
    const p = (n) => String(n).padStart(2, "0");
    let h = d.getHours();
    const ampm = h >= 12 ? "PM" : "AM";
    h = h % 12 || 12;
    return `${day} ${p(h)}:${p(d.getMinutes())} ${ampm}`;
  }
  return <span>{t}</span>;
}

const SPAWN_POSITIONS = [
  { x: 340, y: 80 },
  { x: 400, y: 110 },
  { x: 460, y: 140 },
  { x: 300, y: 170 },
  { x: 520, y: 90 },
  { x: 360, y: 200 },
];

      title,
      icon: "📄",
      w: 420, h: 320,
      statusBar: { left: "0 b · empty", right: "● unsaved" },
      content: (

    projects:   { uid: "projects",   title: "projects/",     icon: "📁", w: 580, h: 480, content: <ProjectsWin data={data} onOpen={(p) => openProject(p)} /> },
    writing:    { uid: "writing",    title: "writing/",      icon: "📁", w: 560, h: 380, content: <WritingWin data={data} onOpenNote={openNote} /> },
    now:        { uid: "now",        title: "now.app",       icon: "♪",  w: 480, h: 420, content: <NowWin data={data} /> },
    contact:    { uid: "contact",    title: "contact.app",   icon: "💌", w: 480, h: 440, content: <ContactWin data={data} /> },
    education:  { uid: "education",  title: "education.txt", icon: "🎓", w: 560, h: 420, content: <EducationWin data={data} /> },
    sticky:     { uid: "sticky",     title: "notes.sticky",  icon: "📌", w: 360, h: 280, theme: "sticky", content: <StickyWin /> },
    readme:     { uid: "readme",     title: "README.md",     icon: "📄", w: 640, h: 600, padded: false, content: <ReadmeWin data={data} /> },
    hdd:        { uid: "hdd",        title: "akshay.os",     icon: "💾", w: 480, h: 360, padded: false, content: (
      <div className="readme">
        <pre className="ascii">{`  ╔════════════════════╗
  ║   AKSHAY · OS v1   ║
  ╚════════════════════╝`}</pre>
        <h2>System info</h2>
        <p>cpu · 1 brain, 2 cores (often kafka-bound)<br/>ram · ~12 tabs of stack overflow<br/>os · debian / mac / mind<br/>uptime · 9.4 yrs of shipping code<br/>locale · IST · UTC+5:30</p>
        <h2>Mounted volumes</h2>
        <ul>
          <li><code>/work</code> · Micro1 — backend</li>
          <li><code>/side</code> · reinforce-backend</li>
          <li><code>/play</code> · rust + tokio</li>
          <li><code>/idle</code> · filter coffee + podcasts</li>
        </ul>
      </div>
    ) },
    trash:      { uid: "trash",      title: "trash",         icon: "🗑", w: 420, h: 260, content: (
      <div style={{ textAlign: "center", padding: "30px 20px" }}>
        <div style={{ fontSize: 56, marginBottom: 12 }}>🗑</div>
        <div style={{ fontFamily: "var(--f-display)", fontWeight: 700, fontSize: 20, marginBottom: 6 }}>trash is empty.</div>

}

function Desktop({ data }) {
  const [windows, setWindows] = useState([]);
  const [focusId, setFocusId] = useState(null);
  const zRef = useRef(10);
  const spawnIdx = useRef(0);
  const noteCount = useRef(0);
  const [cmd, setCmd] = useState(false);
  const [openMenu, setOpenMenu] = useState(null);

  useEffect(() => {
    function onKey(e) {
      if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") { e.preventDefault(); setCmd((c) => !c); }
      else if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "n") { e.preventDefault(); openNote(); }
    }
    window.addEventListener("keydown", onKey);
    return () => window.removeEventListener("keydown", onKey);
  }, []);

  const openWin = useCallback((id, payload = null) => {
    const spec = buildSpec(id, data, (p) => openWin("project", p), payload, (p) => openNote(p));
    if (!spec) return;
    zRef.current += 1;

    setWindows((prev) => {
      const existing = prev.find((w) => w.uid === spec.uid);
      if (existing) {
        setFocusId(spec.uid);
        return prev.map((w) => w.uid === spec.uid ? { ...w, z: zRef.current, minimized: false } : w);
      }
      const isMobile = window.innerWidth < 760;
      let pos;
      if (isMobile) {
        const vw = window.innerWidth;
        const vh = window.innerHeight - 34 - 56;
        pos = { x: 6, y: 44, w: Math.min(spec.w || 560, vw - 12), h: Math.min(spec.h || 440, vh - 16) };
      } else {
        const sp = SPAWN_POSITIONS[spawnIdx.current % SPAWN_POSITIONS.length];
        spawnIdx.current += 1;
        const vw = window.innerWidth, vh = window.innerHeight;
        pos = {
          x: Math.max(8, Math.min(sp.x, vw - (spec.w || 560) - 8)),
          y: Math.max(44, Math.min(sp.y, vh - 140)),
          w: spec.w || 560, h: spec.h || 440,
        };
      }
      setFocusId(spec.uid);
      return [...prev, { ...spec, ...pos, z: zRef.current, minimized: false, maximized: false }];
    });
  }, [data]);

  const openNote = useCallback((payload = null) => {
    noteCount.current += 1;
    const merged = payload && payload.title
      ? { ...payload, num: noteCount.current, uid: `note-${payload.title}-${noteCount.current}` }
      : { num: noteCount.current };
    openWin("note", merged);
  }, [openWin]);

  useEffect(() => { openWin("welcome"); }, [openWin]);

  function closeWin(uid) { setWindows((prev) => prev.filter((w) => w.uid !== uid)); setFocusId(null); }
  function minWin(uid)   { setWindows((prev) => prev.map((w) => w.uid === uid ? { ...w, minimized: !w.minimized } : w)); }
  function maxWin(uid)   { setWindows((prev) => prev.map((w) => w.uid === uid ? { ...w, maximized: !w.maximized } : w)); }
  function focusWin(uid) {
    zRef.current += 1;
    const z = zRef.current;
    setFocusId(uid);
    setWindows((prev) => prev.map((w) => w.uid === uid ? { ...w, z, minimized: false } : w));
  }
  function moveWin(uid, pos) {
    setWindows((prev) => prev.map((w) => w.uid === uid ? { ...w, x: pos.x, y: pos.y } : w));
  }

  function tileWindows() {
    setWindows((prev) => {
      const visible = prev.filter(w => !w.minimized);
      const n = visible.length;
      if (n === 0) return prev;
      const cols = Math.ceil(Math.sqrt(n));
      const rows = Math.ceil(n / cols);
      const vw = window.innerWidth, vh = window.innerHeight - 34 - 56;
      const cw = Math.floor(vw / cols), ch = Math.floor(vh / rows);
      const positions = new Map();
      visible.forEach((w, i) => {
        const r = Math.floor(i / cols);
        const c = i % cols;
        positions.set(w.uid, { x: c * cw + 6, y: r * ch + 6, w: cw - 12, h: ch - 12 });
      });
      return prev.map(w => positions.has(w.uid) ? { ...w, ...positions.get(w.uid), maximized: false } : w);
    });
  }

  const menuController = { value: openMenu, set: setOpenMenu };

  const DESKTOP_ITEMS = [
    { id: "welcome",    name: "welcome.rtf",   icon: <DocIcon color="var(--paper)" /> },
    { id: "about",      name: "about-me.txt",  icon: <MeIcon /> },
    { id: "experience", name: "experience/",   icon: <FolderIcon color="var(--yellow)" /> },
    { id: "projects",   name: "projects/",     icon: <FolderIcon color="var(--mint)" /> },
    { id: "skills",     name: "skills.app",    icon: <AppIcon color="var(--purple)" glyph="⚙" /> },
    { id: "writing",    name: "writing/",      icon: <FolderIcon color="var(--pink)" /> },
    { id: "now",        name: "now.app",       icon: <MusicIcon /> },
    { id: "contact",    name: "contact.app",   icon: <MailIcon /> },
    { id: "education",  name: "education.txt", icon: <DocIcon color="var(--orange)" /> },
    { id: "sticky",     name: "notes.sticky",  icon: <StickyIcon /> },
    { id: "readme",     name: "README.md",     icon: <ReadmeIcon /> },
    { id: "hdd",        name: "akshay.os",     icon: <HddIcon /> },
    { id: "trash",      name: "trash",         icon: <TrashIcon /> },
  ];

  const akshayItems = [
    { custom: <ContactHead data={data} /> },
    { icon: "✉", label: "Email me",       hint: "↗", action: () => window.location.href = `mailto:${data.email}` },
    { icon: "in", label: "LinkedIn",       hint: "↗", action: () => window.open(data.linkedin, "_blank") },
    { icon: "𝕏", label: "Twitter",        hint: "↗", action: () => window.open(data.twitter, "_blank") },
    { icon: "gh", label: "GitHub",         hint: "↗", action: () => window.open(data.github, "_blank") },
    { divider: true },
    { icon: "👤", label: "About me",      hint: "↵", action: () => openWin("about") },
    { icon: "💾", label: "About this OS", hint: "↵", action: () => openWin("hdd") },
    { divider: true },
    { icon: "↗", label: "Open contact.app", action: () => openWin("contact") },
  ];

  const fileItems = [
    { icon: "📄", label: "New Note",    hint: "⌘N", action: () => openNote() },
    { icon: "📂", label: "Open…",       hint: "⌘K", action: () => setCmd(true) },
    { divider: true },
    { icon: "📄", label: "welcome.rtf",   action: () => openWin("welcome") },
    { icon: "👤", label: "about-me.txt",  action: () => openWin("about") },
    { icon: "📁", label: "projects/",     action: () => openWin("projects") },
    { icon: "📁", label: "experience/",   action: () => openWin("experience") },
    { divider: true },
    { icon: "✕", label: "Close all windows", action: () => setWindows([]) },
  ];
  const editItems = [
    { icon: "↶", label: "Undo",        hint: "⌘Z", disabled: true },
    { icon: "↷", label: "Redo",        hint: "⇧⌘Z", disabled: true },
    { divider: true },
    { icon: "✄", label: "Cut",         hint: "⌘X", disabled: true },
    { icon: "⎘", label: "Copy",        hint: "⌘C", disabled: true },
    { icon: "📋", label: "Paste",      hint: "⌘V", disabled: true },
    { divider: true },
    { icon: "🔍", label: "Find",       hint: "⌘K", action: () => setCmd(true) },
  ];
  const viewItems = [
    { icon: "▦", label: "Tile windows",    action: tileWindows },
    { icon: "↻", label: "Restore desktop", action: () => { setWindows([]); openWin("welcome"); } },
    { divider: true },
    { icon: "♪", label: "Now playing",     action: () => openWin("now") },
    { icon: "📌", label: "Sticky notes",   action: () => openWin("sticky") },
    { icon: "🗑", label: "Trash",          action: () => openWin("trash") },
  ];
  const helpItems = [
    { icon: "?", label: "Welcome",       action: () => openWin("welcome") },
    { icon: "📖", label: "README.md",    action: () => openWin("readme") },
    { icon: "💾", label: "About akshay.os", action: () => openWin("hdd") },
    { divider: true },
    { icon: "✉", label: "Contact me",   action: () => openWin("contact") },
    { icon: "↗", label: "GitHub repo",   action: () => window.open(data.github, "_blank") },
  ];

  return (
    <>
      <div className="menubar">
        <div className="apple">★</div>

        <Menu
          openController={{ id: "akshay", ...menuController }}
          align="left"
          trigger={({ open, toggle }) => (
            <div className={`m-item bold ${open ? "open" : ""}`} onClick={toggle}>akshay.os</div>
          )}
          items={akshayItems}
        />
        <Menu
          openController={{ id: "file", ...menuController }}
          trigger={({ open, toggle }) => <div className={`m-item ${open ? "open" : ""}`} onClick={toggle}>File</div>}
          items={fileItems}
        />
        <Menu
          openController={{ id: "edit", ...menuController }}
          trigger={({ open, toggle }) => <div className={`m-item ${open ? "open" : ""}`} onClick={toggle}>Edit</div>}
          items={editItems}
        />
        <Menu
          openController={{ id: "view", ...menuController }}
          trigger={({ open, toggle }) => <div className={`m-item ${open ? "open" : ""}`} onClick={toggle}>View</div>}
          items={viewItems}
        />
        <Menu
          openController={{ id: "help", ...menuController }}
          trigger={({ open, toggle }) => <div className={`m-item help ${open ? "open" : ""}`} onClick={toggle}>Help</div>}
          items={helpItems}
        />

        <div className="spacer" />

        <div className="meta">
          <Menu
            openController={{ id: "contact", ...menuController }}
            align="right"
            trigger={({ open, toggle }) => (
              <button className={`contact-button ${open ? "open" : ""}`} onClick={toggle} aria-label="Contact menu">
                <span style={{ fontSize: 13 }}>✉</span>
                <span>contact</span>
              </button>
            )}
            items={buildContactItems(data, openWin)}
          />
          <span className="hide-sm">indore, in</span>
          <span className="live">online</span>
          <MenuClock />
        </div>
      </div>

      <div className="desktop" onMouseDown={() => setOpenMenu(null)}>
        <div className="desktop-icons">
          {DESKTOP_ITEMS.map((it) =>
            <DesktopIcon key={it.id} icon={it.icon} name={it.name} onOpen={() => openWin(it.id)} />
          )}
        </div>

        {windows.map((w) =>
          <Win key={w.uid} win={w} focused={focusId === w.uid}
               onFocus={focusWin} onClose={closeWin} onMin={minWin} onMax={maxWin} onMove={moveWin}>
            {w.content}
          </Win>
        )}
      </div>

      <div className="dock">
        <button className="start-btn" onClick={() => setCmd(true)}>
          <span className="dot" /> start
        </button>
        <div className="open-list">
          {windows.map((w) =>
            <button key={w.uid}
              className={`dock-tab ${focusId === w.uid && !w.minimized ? "active" : ""}`}
              onClick={() => { if (focusId === w.uid && !w.minimized) minWin(w.uid); else focusWin(w.uid); }}>
              <span>{w.icon}</span><span>{w.title}</span>
            </button>
          )}
        </div>
        <div className="meta-right">
          <span className="clock hide-sm"><MenuClock /></span>
          <button className="iconbtn" onClick={() => setCmd(true)} title="Open command palette">
            <svg viewBox="0 0 16 16" width="16" height="16" fill="none" stroke="currentColor" strokeWidth="1.8">
              <circle cx="7" cy="7" r="4.5" /><path d="M10.5 10.5 L14 14" />
            </svg>
          </button>
        </div>
      </div>

      <CommandPalette open={cmd} onClose={() => setCmd(false)} openWin={openWin} extraItems={[
        { sec: "Actions", icon: "📄", label: "New Note", action: () => openNote() },
        { sec: "Actions", icon: "▦", label: "Tile windows", action: tileWindows },
      ]} />
    </>
  );
}

function App() {
  return <Desktop data={window.PORTFOLIO_DATA} />;
